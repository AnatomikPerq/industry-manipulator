[pytest]
# Тесты живут внутри analyzer_to_errors, а не в корне: ingest.py пишет пути
# документов в манифест через relative_to(PROJECT_ROOT), а main.py собирает их
# обратно как PROJECT_ROOT / doc["data_dir"]. Фикстура - это готовый манифест с
# такими путями, и снаружи analyzer_to_errors он бы попросту не собрался.
# Ровно то же ограничение, по которому там же обязаны лежать папки сессий.
testpaths = analyzer_to_errors/tests

# Пайплайн не пакет: модули лежат плоско и импортируются по имени
# (import main, import ingest). Пути в sys.path добавляет conftest.py.
addopts = -q --import-mode=prepend
