# Образец локальных настроек. Скопируйте в config.local.yaml и правьте под
# свою машину - тот файл в репозиторий не едет.
#
#     cp config.local.example.yaml config.local.yaml
#
# Переопределяются ТОЛЬКО названные здесь ветки: всё остальное берётся из
# config.yaml, и обновление проекта не требует переписывать этот файл.
#
# Зачем это отдельно от config.yaml: адрес сервера ИИ - свойство установки, а
# не проекта. У одного он на этой же машине (LM Studio по умолчанию слушает
# localhost:1234), у другого - на машине в серверной. В общем конфиге он
# неизбежно оказывался чьим-то личным и уезжал в репозиторий вместе с ним.

llm_servers:
  agent_1:
    base_url: "http://localhost:1234/v1"
    # api_key: "..."          # если сервер требует ключ
    # model: "..."            # если модель называется иначе, чем в config.yaml
  agent_2:
    base_url: "http://localhost:1234/v1"
