# =========================================================
# Настройки серверов с нейросетями (OpenAI-совместимый API,
# например vLLM / LM Studio / text-generation-webui / etc.)
# =========================================================
#
# АДРЕС СЕРВЕРА ЗАДАЁТСЯ НЕ ЗДЕСЬ, а в config.local.yaml рядом (см.
# config.local.example.yaml): это свойство конкретной установки, а не проекта.
# Здесь стоит адрес по умолчанию - LM Studio на той же машине. Локальный файл
# переопределяет только названные в нём ветки, поэтому остальное - модели,
# лимиты, температура - продолжает браться отсюда.

llm_servers:
  agent_1:
    base_url: "http://localhost:1234/v1"
    api_key: "not-needed"            # если сервер требует ключ - вписать сюда
    model: "qwen3.6-35b-a3b-uncensored-hauhaucs-aggressive"
    temperature: 0.2
    max_tokens: 8192              # лимит на ДЛИНУ ОТВЕТА модели (НЕ размер контекста!).
                                  # Должен быть заметно меньше context_window, иначе Open
                                  # Interpreter не оставит места под историю и обрежет промпт.
    context_window: 512000           # используется Open Interpreter (llm.context_window)

  agent_2:
    base_url: "http://localhost:1234/v1"
    api_key: "not-needed"
    model: "qwythos-9b-claude-mythos-5-1m"
    temperature: 0.2
    max_tokens: 8192              # лимит на ДЛИНУ ОТВЕТА модели (НЕ размер контекста!).
                                  # Должен быть заметно меньше context_window, иначе Open
                                  # Interpreter не оставит места под историю и обрежет промпт.
    context_window: 512000 

  # Модель-"сшиватель" отчётов. Отдельного сервера не поднимаем -
  # переиспользуем одну из моделей выше по названию ключа. Используется, только
  # если agents.count = 2 (сшивать в одиночку нечего).
  merger:
    use_agent: "agent_1"   # "agent_1" или "agent_2"

# =========================================================
# Сколько нейросетей-агентов запускать
# =========================================================
agents:
  # 1 - анализирует только одна нейросеть (какая именно - см. single_agent ниже);
  #     LLM-сшиватель (merge_reports.py) не вызывается вовсе - мерджить с одним
  #     отчётом нечего, отчёт агента напрямую соединяется с находками чекеров/связок.
  # 2 - как раньше: оба агента анализируют независимо, их отчёты сшивает LLM-мерджер.
  count: 1

  # При count: 1 - какой из серверов выше ("agent_1" или "agent_2") используется
  # как единственный агент анализа. Игнорируется при count: 2.
  single_agent: "agent_1"

# =========================================================
# Поведение агента анализа / валидации JSON
# =========================================================
agent:
  # Сколько раз просить модель переисправить ответ, если JSON не прошёл
  # валидацию по схеме (schema.py). После исчерпания попыток - ошибка.
  max_json_repair_attempts: 3

  # Предохранители от зацикливания агента. Open Interpreter крутит цикл
  # "модель пишет код -> код исполняется -> модель смотрит вывод" до тех пор,
  # пока модель САМА не решит, что закончила. Слабая модель может не решить
  # этого никогда. По достижении любого из лимитов агенту приказывают
  # немедленно выдать итоговый JSON по уже собранным данным.
  max_code_turns: 30        # максимум запусков кода на один заход
  timeout_seconds: 1500     # максимум времени на один заход, секунд

# =========================================================
# Стадия извлечения (базовые скрипты-парсеры PDF)
# =========================================================
extraction:
  # Не перепарсивать документ, если данные прошлого прогона ещё годны: исходный
  # файл с тех пор не менялся (размер и время правки), набор парсеров тот же,
  # разбор тогда не падал и все его файлы на месте. Отметка лежит в
  # data/<имя документа>/.extraction.json.
  # false = каждый прогон перепарсивает PDF заново.
  #
  # Папка документа перед НАСТОЯЩИМ разбором чистится в любом случае: раньше
  # этот флаг только запрещал её стирать, извлечение шло всё равно, и файлы
  # прошлого прогона оставались лежать рядом с новыми.
  reuse_existing: true

# =========================================================
# Пути
# =========================================================
# Все пути - относительно папки с этим config.yaml, а не относительно
# текущей директории запуска.
paths:
  base_files_dir: "./data/base_files"                  # PDF, загруженные пользователем
  full_projects_dir: "./data/full_projects"            # альбомы целиком (200+ листов): режутся на документы в base_files/<шкаф>/
  scripts_dir: "./data/base_analysis_scripts"          # базовые скрипты-парсеры
  helper_scripts_dir: "./data/your_helping_scripts_and_files"  # рабочая папка агента
  input_dir: "./data"                                  # песочница агента: сюда парсеры кладут data/<имя документа>/
  known_errors_file: "./known_errors.json"             # ошибки, которые вырезаются из финального отчёта
  output_dir: "./output"

# =========================================================
# Логирование
# =========================================================
logging:
  level: "INFO"
  save_raw_agent_json: true   # сохранять report_1.json / report_2.json до слияния
